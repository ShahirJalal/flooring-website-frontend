<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>Admin Login</h1>
            <p>Enter your credentials to access the dashboard</p>
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" name="username" [(ngModel)]="loginData.username" required
                        #username="ngModel" [class.is-invalid]="username.invalid && username.touched">
                </div>
                <div class="error-message" *ngIf="username.invalid && username.touched">
                    Username is required
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
                        [(ngModel)]="loginData.password" required #password="ngModel"
                        [class.is-invalid]="password.invalid && password.touched">
                    <button type="button" class="toggle-password" (click)="togglePassword()">
                        {{showPassword ? '👁️' : '👁️‍🗨️'}}
                    </button>
                </div>
                <div class="error-message" *ngIf="password.invalid && password.touched">
                    Password is required
                </div>
            </div>

            <div class="form-group">
                <label class="remember-me">
                    <input type="checkbox" name="rememberMe" [(ngModel)]="loginData.rememberMe">
                    Remember me
                </label>
            </div>

            <button type="submit" [disabled]="loginForm.invalid || isLoading" class="login-button">
                {{ isLoading ? 'Logging in...' : 'Login' }}
            </button>

            <div class="error-message login-error" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>
        </form>
    </div>
</div>
