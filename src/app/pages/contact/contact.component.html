<div class="contact-container">
    <header class="contact-header">
        <h1>Contact Us</h1>
        <p>Get in touch for all your flooring needs</p>
    </header>

    <div class="contact-content">
        <div class="contact-info">
            <div class="info-card">
                <div class="icon">📱</div>
                <h3>Phone</h3>
                <p>+60 12-345 6789</p>
                <p>Mon-Fri: 9am - 6pm</p>
            </div>

            <div class="info-card">
                <div class="icon">✉️</div>
                <h3>Email</h3>
                <p>info&commat;decohood.com</p>
                <p>24/7 online support</p>
            </div>

            <div class="info-card">
                <div class="icon">📍</div>
                <h3>Location</h3>
                <p>123 Floor Street</p>
                <p>Kuala Lumpur, Malaysia</p>
            </div>
        </div>

        <div class="contact-form">
            <h2>Send us a message</h2>
            <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" [(ngModel)]="formData.name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" [(ngModel)]="formData.email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" [(ngModel)]="formData.phone" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" [(ngModel)]="formData.message" required rows="5"></textarea>
                </div>

                <button type="submit" [disabled]="!contactForm.form.valid">Send Message</button>
            </form>
        </div>
    </div>
</div>
